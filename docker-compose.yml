services:
  app:
    image: ghcr.io/dinu-sri/mcq-accounting-app:latest
    container_name: mcq-accounting-app
    restart: unless-stopped
    ports:
      - "3003:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_BASE_URL=${NEXT_PUBLIC_BASE_URL}
      - APP_URL=${APP_URL}
      - DB_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD_is_required}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mcq-net

  postgres:
    image: postgres:16-alpine
    container_name: mcq-accounting-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: mcquser
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD_is_required}
      POSTGRES_DB: mcqdb
    volumes:
      - mcq_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcquser"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mcq-net

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: mcq-accounting-tunnel
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN:?CF_TUNNEL_TOKEN_is_required}
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - mcq-net

volumes:
  mcq_postgres_data:
    name: mcq-accounting-postgres

networks:
  mcq-net:
    driver: bridge
